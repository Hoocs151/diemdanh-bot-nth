# Docker Compose cho Bot Điểm Danh Bang Chiến
#
# Cách sử dụng:
#   1. Copy .env.example thành .env và điền thông tin
#   2. Chạy: docker-compose up -d
#   3. Xem logs: docker-compose logs -f
#   4. Dừng: docker-compose down
#

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bang-chien-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount thư mục data để persist database
      - ./data:/app/data
      # Mount thư mục logs để xem logs
      - ./logs:/app/logs
      # Mount thư mục backups để giữ lại backup
      - ./backups:/app/backups
    # Giới hạn tài nguyên (tùy chọn)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
